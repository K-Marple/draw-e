<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw-E</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
    <script src="https://kit.fontawesome.com/1e0b345f0f.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="drawing-container">
        <section class="tools-container" id="tools-container">
            <div class="tools">
                <label for="tools" class="title">Tools</label>
                <ul class="options">
                    <li class="option tool" id="pencil">
                        <i class="fa-solid fa-pencil" id="icon"></i>
                        <span>Pencil</span>
                    </li>
                    <li class="option active tool" id="brush">
                        <i class="fa-solid fa-paintbrush" id="icon"></i>
                        <span>Brush</span>
                    </li>
                    <li class="option tool" id="eraser">
                        <i class="fa-solid fa-eraser" id="icon"></i>
                        <span>Eraser</span>
                    </li>
                    <li class="option">
                        <input type="range" class="line-size" id="lineSize" min="1" max="30" value="5">
                    </li>
                </ul>
            </div>
            <div class="colors">
                <label for="colors" class="title">Colors</label>
                <ul class="options">
                    <li class="option selected"></li>
                    <li class="option"></li>
                    <li class="option"></li>
                    <li class="option"></li>
                    <li class="option"></li>
                    <li class="option"></li>
                    <li class="option"></li>
                    <li class="option"></li>
                    <li class="option">
                        <input type="color" value="#f0f1f9" name="" id="color-picker">
                    </li>
                </ul>
            </div>
            <div class="shapes">
                <label for="shapes" class="title">Shapes</label>
                <ul class="options">
                    <li class="option tool" id="rectangle">
                        <i class="fa-solid fa-square"></i>
                        <span>Rectangle</span>
                    </li>
                    <li class="option tool" id="circle">
                        <i class="fa-solid fa-circle"></i>
                        <span>Circle</span>
                    </li>
                    <li class="option tool" id="triangle">
                        <i class="fa-solid fa-play"></i>
                        <span>Triangle</span>
                    </li>
                    <li class="option tool" id="square">
                        <i class="fa-solid fa-square"></i>
                        <span>Square</span>
                    </li>
                    <li class="option tool" id="line">
                        <i class="fa-solid fa-grip-lines-vertical"></i>
                        <span>Line</span>
                    </li>
                    <li class="option" id="fill-color">
                        <input type="checkbox" id="fill-color">
                        <label for="fill-color">Fill Color</label>
                    </li>
                </ul>
            </div>
            <div class="buttons">
                <button class="clear" id="clear">Clear</button>
                <button class="save" id="save">Save Image</button>
            </div>
        </section>
        <section class="canvas-container">
            <canvas id="canvas"></canvas>
        </section>
    </div>
</body>
</html>
